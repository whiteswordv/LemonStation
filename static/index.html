<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style/style.css" />
    <title>Lemon Workstation</title>
</head>


<div id="warning-container">
    <p>
        warning NetworkTables are disconnected,
        make sure you have it plugged in with a link cable,
        or over a radio!
    </p>
</div>


<body>
    <div id="motor-grid"></div>
    <div id="motor-menu">
        <div class="parent">

            <div id="dash-container">
                <img id="motor-img" />
                <div id="faults-container">
                    <div id="faults"></div>
                    <div id="sticky-faults">
                        <input type="button" value="clear " id="clear-sticky-faults-button">
                    </div>
                </div>


                <div id="addon-properties">
                    <div id="drop-down-container">
                        <select name="MotorType" id="motor-dropdown-type">
                            <option value="brushed">Brushed</option>
                            <option value="brushless">Brushless</option>
                        </select>
                    </div>
                </div> <!-- this is for encoders or other inputs or brushed brushless etc -->
            </div>

            <div id="properties">
                <!-- <img id="motor-img"> -->
                <h1 id="motor-name"></h1>
                <h2 id="motor-id"></h2>
                <h3 id="motor-speed-output">Speed: 0</h2>
                    <input type="range" min="-1" max="1" value="0" step="0.001" id="speed-slider" title="speed" />



                    <div class="invert-container">
                        <input type="checkbox" id="inverted-input" />
                        <h2 id="inverted">Inverted</h2>
                    </div>

                    <div class="disabled-container">
                        <input type="checkbox" id="disabled-input" checked>
                        <h2 id="disabled">Disabled</h2>
                    </div>

                    <button title="back" id="back-button">Back</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
